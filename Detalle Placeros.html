    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
            padding-top: 100px; /* Altura optimizada para encabezado compacto */
        }

        header {
             background-color: var(--bg-main);
             border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        details {
            border-radius: var(--radius-sys);
            margin-bottom: 0.75rem;
            overflow: hidden;
            background-color: var(--blanco);
            color: var(--azul-inst);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            scroll-margin-top: 110px;
        }

        summary {
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            padding: 0.85rem 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
        }

        summary::-webkit-details-marker { display: none; }

        summary::after {
            content: '▼';
            font-size: 0.6rem;
            transition: transform 0.3s ease;
            color: var(--acento);
        }

        details[open] > summary::after { transform: rotate(180deg); }

        .cgm-details { border-left: 6px solid var(--acento); }
        
        .plaza-details {
            background-color: var(--glass-claro);
            margin: 0.25rem 0.75rem 0.75rem 0.75rem;
            border-radius: 8px;
        }
        
        .plaza-summary {
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            color: var(--azul-inst);
        }

        .placero-card {
            background-color: var(--blanco);
            border: 1px solid rgba(25, 86, 124, 0.1);
            border-radius: 6px;
            padding: 0.85rem;
            color: var(--azul-inst);
        }

        .label-text {
            color: var(--azul-inst);
            opacity: 0.6;
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            display: block;
        }
        
        .value-text {
            font-weight: 700;
            display: block;
            font-size: 0.85rem;
            line-height: 1.2;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--acento); border-radius: 3px; }
    </style>
</head>

        ];

        function groupData(data) {
            const cgmGroup = {};
            data.forEach(item => {
                // UNIFICACIÓN DE LLAVALLOL (Capitalize y Trim)
                let cgm = (item.CGM || "Sin CGM Asignado").trim().toUpperCase();
                const plaza = (item.PLAZA || "Sin Plaza Asignada").trim();
                
                if (!cgmGroup[cgm]) cgmGroup[cgm] = {};
                if (!cgmGroup[cgm][plaza]) cgmGroup[cgm][plaza] = [];
                
                cgmGroup[cgm][plaza].push({
                    placero: item.PLACERO || 'N/A',
                    legajo: item.LEGAJO || 'N/A',
                    horario: item.HORARIO || 'No especificado'
                });
            });

            return Object.keys(cgmGroup).sort().reduce((obj, key) => { 
                obj[key] = Object.keys(cgmGroup[key]).sort().reduce((pObj, pKey) => {
                    pObj[pKey] = cgmGroup[key][pKey];
                    return pObj;
                }, {});
                return obj;
            }, {});
        }

        function renderDetails(groupedData) {
            const container = document.getElementById('detalle-container');
            let html = '';
            for (const cgmName in groupedData) {
                html += `<details class="cgm-details">`;
                html += `<summary>${cgmName}</summary> <div class="pb-1">`;
                for (const plazaName in groupedData[cgmName]) {
                    html += `<details class="plaza-details">`;
                    html += `<summary class="plaza-summary">${plazaName}</summary>`;
                    html += `<div class="p-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">`;
                    groupedData[cgmName][plazaName].forEach(placero => {
                        html += `
                            <div class="placero-card">
                                <span class="label-text">Agente</span>
                                <span class="value-text mb-2">${placero.placero}</span>
                                <div class="flex justify-between border-t border-gray-100 pt-2 mt-1">
                                    <div><span class="label-text">Legajo</span><span class="value-text text-[10px] text-[#4AB5E0]">${placero.legajo}</span></div>
                                    <div class="text-right"><span class="label-text">Turno</span><span class="value-text text-[9px]">${placero.horario}</span></div>
                                </div>
                            </div>`;
                    });
                    html += `</div></details>`;
                }
                html += `</div></details>`;
            }
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderDetails(groupData(driveData));
        });
