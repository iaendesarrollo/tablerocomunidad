<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Deuda Flotante - Sistema Institucional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER */
        .solid-header {
             background-color: var(--bg-main);
             border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* TIPOGRAFÍA */
        h1 { font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        h2 { font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--azul-inst); }
        .text-desc { font-weight: 400; font-size: 0.875rem; }
        .text-num { font-weight: 700; }

        /* COMPONENTES BASE (CARDS FLAT) */
        .card-informativa {
            background-color: var(--blanco);
            color: var(--azul-inst);
            border-radius: var(--radius-sys);
            padding: 1.5rem;
            position: relative;
            border-left: 8px solid var(--acento);
        }

        .card-grafica {
            background-color: var(--glass-claro);
            color: var(--azul-inst);
            border-radius: var(--radius-sys);
            padding: 1.5rem;
        }

        .kpi-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            opacity: 0.05;
            color: var(--azul-inst);
        }

        /* TABLAS */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--azul-inst);
            padding: 0.75rem;
            text-align: left;
            border-bottom: 2px solid rgba(25, 86, 124, 0.2);
            letter-spacing: 0.1em;
        }
        td {
            padding: 0.75rem;
            font-size: 0.875rem;
            color: var(--azul-inst);
            border-bottom: 1px solid rgba(25, 86, 124, 0.1);
        }
        tbody tr:last-child td { border-bottom: none; }
        
        .font-mono-nums { font-variant-numeric: tabular-nums; }
    </style>
</head>

    <header class="solid-header fixed top-0 left-0 w-full z-50 transition-all duration-300">

            </section>

        "PROVEEDOR": "3-11087  SUBSIDIO POR FALLECIMIENTO",
        "SALDO/DEUDA 2025": 0.01
    }
];

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(amount);
        };

        const formatMillions = (amount) => {
            return '$ ' + (amount / 1000000).toFixed(1) + ' M';
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-AR');

            // KPI Total unificado en Millones
            document.getElementById('total-deuda-value').textContent = formatMillions(kpiData["Total Deuda Flotante"]);

            // Tabla - CORTE ESTRICTO TOP 10
            const tablaBody = document.getElementById('tabla-proveedores-body');
            rawProveedores.slice(0, 10).forEach((row, index) => {
                const tr = document.createElement('tr');
                const nombreLimpio = row.PROVEEDOR.replace(/^\d+-\d+\s+/, '');
                tr.innerHTML = `
                    <td class="text-center font-bold" style="color: var(--magenta)">${index + 1}</td>
                    <td class="uppercase font-bold" style="font-size: 0.7rem;">${nombreLimpio}</td>
                    <td class="text-right font-bold font-mono-nums">${formatCurrency(row["SALDO/DEUDA 2025"])}</td>
                `;
                tablaBody.appendChild(tr);
            });

            // Gráfico - CORTE ESTRICTO TOP 10
            const ctx = document.getElementById('proveedoresChart').getContext('2d');
            const top10Data = rawProveedores.slice(0, 10);
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top10Data.map(p => p.PROVEEDOR.replace(/^\d+-\d+\s+/, '').substring(0, 20)),
                    datasets: [{
                        data: top10Data.map(p => p["SALDO/DEUDA 2025"]),
                        backgroundColor: '#4AB5E0',
                        borderRadius: 6,
                        barThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: '#19567C' }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { 
                                color: '#19567C',
                                font: { family: 'Montserrat', size: 10 },
                                callback: (v) => '$' + (v / 1000000).toFixed(0) + 'M'
                            }
                        },
                        y: {
                            grid: { color: 'rgba(25, 86, 124, 0.05)' },
                            ticks: { color: '#19567C', font: { family: 'Montserrat', size: 9, weight: 'bold' } }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
