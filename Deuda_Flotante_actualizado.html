<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero Deuda Flotante - Sistema Institucional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER */
        .solid-header {
             background-color: var(--bg-main);
             border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* TIPOGRAFÍA */
        h1 { font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        h2 { font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--azul-inst); }
        .text-desc { font-weight: 400; font-size: 0.875rem; }
        .text-num { font-weight: 700; }

        /* COMPONENTES BASE (CARDS FLAT) */
        .card-informativa {
            background-color: var(--blanco);
            color: var(--azul-inst);
            border-radius: var(--radius-sys);
            padding: 1.5rem;
            position: relative;
            border-left: 8px solid var(--acento);
        }

        .card-grafica {
            background-color: var(--glass-claro);
            color: var(--azul-inst);
            border-radius: var(--radius-sys);
            padding: 1.5rem;
        }

        .kpi-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            opacity: 0.05;
            color: var(--azul-inst);
        }

        /* TABLAS */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--azul-inst);
            padding: 0.75rem;
            text-align: left;
            border-bottom: 2px solid rgba(25, 86, 124, 0.2);
            letter-spacing: 0.1em;
        }
        td {
            padding: 0.75rem;
            font-size: 0.875rem;
            color: var(--azul-inst);
            border-bottom: 1px solid rgba(25, 86, 124, 0.1);
        }
        tbody tr:last-child td { border-bottom: none; }
        
        .font-mono-nums { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <header class="solid-header fixed top-0 left-0 w-full z-50 transition-all duration-300">
        <div class="container mx-auto px-4 py-4">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex flex-col items-center sm:items-start">
                    <h1 class="text-xl sm:text-2xl text-white">Deuda Flotante</h1>
                    <p class="text-[10px] font-bold tracking-widest uppercase opacity-80 text-white/70">
                        Economía y Finanzas · Proveedores Críticos
                    </p>
                </div>
                
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <p class="text-[10px] font-bold uppercase tracking-widest opacity-80 text-white/70">ULTIMA ACTUALIZACION</p>
                        <p class="text-xl font-bold text-white" id="fecha-actual">--/--/----</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="h-28"></div>

    <div class="max-w-7xl mx-auto space-y-8 pb-12">

        <section id="kpi-container">
            <div class="card-informativa">
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-2">Total Deuda Flotante</p>
                <h3 id="total-deuda-value" class="text-4xl md:text-5xl font-extrabold font-mono-nums">
                    </h3>
                <div class="kpi-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="card-informativa">
                <div class="flex justify-between items-center mb-6">
                    <h2>Top 10 Proveedores Críticos</h2>
                    <span class="text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded bg-[#D34872]/10 text-[#D34872]">Análisis de Riesgo</span>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="w-10 text-center">#</th>
                                <th>Proveedor / Entidad</th>
                                <th class="text-right">Saldo Deuda</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-proveedores-body">
                            </tbody>
                    </table>
                </div>
            </section>

            <section class="card-grafica">
                <h2 class="mb-6">Distribución Deuda (Top 10)</h2>
                <div class="relative w-full h-[450px]">
                    <canvas id="proveedoresChart"></canvas>
                </div>
            </section>
        </div>
    </div>

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(amount);
        };

        const formatMillions = (amount) => {
            return '$ ' + (amount / 1000000).toFixed(1) + ' M';
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-AR');

            // KPI Total unificado en Millones
            document.getElementById('total-deuda-value').textContent = formatMillions(kpiData["Total Deuda Flotante"]);

            // Tabla - CORTE ESTRICTO TOP 10
            const tablaBody = document.getElementById('tabla-proveedores-body');
            rawProveedores.slice(0, 10).forEach((row, index) => {
                const tr = document.createElement('tr');
                const nombreLimpio = row.PROVEEDOR.replace(/^\d+-\d+\s+/, '');
                tr.innerHTML = `
                    <td class="text-center font-bold" style="color: var(--magenta)">${index + 1}</td>
                    <td class="uppercase font-bold" style="font-size: 0.7rem;">${nombreLimpio}</td>
                    <td class="text-right font-bold font-mono-nums">${formatCurrency(row["SALDO/DEUDA 2025"])}</td>
                `;
                tablaBody.appendChild(tr);
            });

            // Gráfico - CORTE ESTRICTO TOP 10
            const ctx = document.getElementById('proveedoresChart').getContext('2d');
            const top10Data = rawProveedores.slice(0, 10);
            
            new Chart(ctx, {
                type: 'bar',

                    },

</body>
</html>
