<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablero de Control - Covelia Lomas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--blanco); 
            margin: 0;
            padding-bottom: 3rem;
        }
        
        header { 
            background-color: var(--bg-main); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 1.5rem 0; 
        }

        /* Estilo de Tarjetas */
        .card-informativa { 
            background-color: var(--blanco); 
            color: var(--azul-inst); 
            border-radius: var(--radius-sys); 
            padding: 1.5rem; 
            position: relative; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            min-height: 140px;
            border-left: 8px solid var(--acento);
        }
        
        .kpi-icon-bg { position: absolute; right: -5px; bottom: -5px; font-size: 5rem; opacity: 0.05; color: var(--azul-inst); }

        .card-grafica { 
            background-color: var(--glass-claro); 
            color: var(--azul-inst); 
            border-radius: var(--radius-sys); 
            padding: 1.5rem; 
        }

        /* Modal del Mapa */
        #map-modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            padding: 2rem; 
            justify-content: center; 
            align-items: center; 
        }
        #map-container { 
            width: 95%; 
            height: 90%; 
            background: white; 
            border-radius: 12px; 
            position: relative; 
            overflow: hidden; 
        }
        #map { 
            width: 100%; 
            height: 100%; 
            /* Filtro de escala de grises solicitado */
            filter: grayscale(100%) brightness(0.9) contrast(1.2); 
        }
        
        .close-map { 
            position: absolute; 
            top: 1rem; 
            right: 1rem; 
            z-index: 10001; 
            background: var(--magenta); 
            color: white; 
            border: none; 
            padding: 0.5rem 1.5rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Botón Mapa */
        .btn-view-map { 
            background-color: var(--acento); 
            color: white; 
            padding: 0.75rem 1.5rem; 
            border-radius: 10px; 
            font-weight: 700; 
            text-transform: uppercase; 
            transition: 0.3s; 
            cursor: pointer;
            border: none;
        }
        .btn-view-map:hover { background-color: #3A95B8; transform: translateY(-2px); }

        /* Tablas */
        .table-container { background-color: var(--blanco); border-radius: var(--radius-sys); overflow: hidden; color: var(--azul-inst); }
        table { width: 100%; border-collapse: collapse; }
        th { text-transform: uppercase; font-weight: 800; font-size: 0.7rem; padding: 1rem; text-align: left; border-bottom: 2px solid rgba(25, 86, 124, 0.1); }
        td { padding: 1rem; font-size: 0.85rem; border-bottom: 1px solid rgba(25, 86, 124, 0.05); }
        
        .critical-text { color: var(--magenta) !important; font-weight: 700; }
        h1 { font-weight: 800; text-transform: uppercase; letter-spacing: -0.025em; }
    </style>
</head>
<body>

    <header>
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl text-white">Tablero de Control</h1>
                <p class="text-[10px] text-[#4AB5E0] font-bold uppercase tracking-[0.2em]">Logística y Recolección</p>
            </div>
            <div class="flex items-center gap-6">
                <button class="btn-view-map" onclick="openMap()">
                    <i class="fas fa-map-marked-alt mr-2"></i> Ver Mapa Operativo
                </button>
                <div class="text-right border-l border-white/20 pl-6">
                    <p class="text-[10px] uppercase font-bold opacity-60 text-white">Última Actualización</p>
                    <p class="text-xl font-bold text-white">26/01/2026</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-8">
        
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card-informativa">
                <p class="text-[10px] font-bold uppercase opacity-60">Total Rutas</p>
                <h2 class="text-5xl font-extrabold">81</h2>
                <i class="fas fa-truck kpi-icon-bg"></i>
            </div>
            <div class="card-informativa">
                <p class="text-[10px] font-bold uppercase opacity-60">% Cumplimiento</p>
                <h2 class="text-5xl font-extrabold">96.3%</h2>
                <i class="fas fa-check-circle kpi-icon-bg"></i>
            </div>
            <div class="card-informativa">
                <p class="text-[10px] font-bold uppercase opacity-60">KMs Recorridos</p>
                <h2 class="text-5xl font-extrabold">1.480,8</h2>
                <i class="fas fa-tachometer-alt kpi-icon-bg"></i>
            </div>
            <div class="card-informativa" style="border-left-color: var(--magenta);">
                <p class="text-[10px] font-bold uppercase opacity-60">Novedades (Check)</p>
                <h2 class="text-5xl font-extrabold critical-text">3</h2>
                <i class="fas fa-exclamation-triangle kpi-icon-bg" style="color: var(--magenta);"></i>
            </div>
        </section>

        <section class="card-grafica shadow-inner">
            <h3 class="text-sm font-bold uppercase mb-6 tracking-widest"><i class="fas fa-chart-line mr-2"></i> Evolución Operativa</h3>
            <div class="h-72">
                <canvas id="chartEvolucion"></canvas>
            </div>
        </section>

        <section class="table-container shadow-2xl">
            <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
                <h3 class="text-sm font-bold uppercase text-[#19567C]"><i class="fas fa-exclamation-circle mr-2"></i> Rutas con Novedades (Check Recorrido)</h3>
                <span class="text-[10px] font-bold text-[#19567C]/60 uppercase">Jornada Actual</span>
            </div>
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Ruta</th>
                            <th>CGM</th>
                            <th>Estado</th>
                            <th>Calles Faltantes</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="map-modal">
        <div id="map-container">
            <button class="close-map" onclick="closeMap()">Cerrar Mapa</button>
            <div id="map"></div>
        </div>
    </div>

    <script>
        // DATOS PROCESADOS (Inyectados dinámicamente)
        const statusMap = {
            "16D": "CHECK RECORRIDO",
            "34D": "CHECK RECORRIDO",
            "35D": "CHECK RECORRIDO"
        };

        const novedadesData = [
            {fecha: "2026-01-26", ruta: "16D", cgm: "Santa Catalina", estado: "CHECK RECORRIDO", detalle: "Pasaje 15, Julio Centari, Tierra del Fuego, entre otros..."},
            {fecha: "2026-01-26", ruta: "34D", cgm: "Santa Catalina", estado: "CHECK RECORRIDO", detalle: "Pasaje Sur, Dario Santillan, Lola Mora, Andrea Maya..."},
            {fecha: "2026-01-26", ruta: "35D", cgm: "Santa Catalina", estado: "CHECK RECORRIDO", detalle: "Lorea, 7 de mayo, Pons, Sandoval, San Juan..."}
        ];

        // 1. Poblado de Tabla (Solo CHECK RECORRIDO)
        const tbody = document.getElementById('tabla-body');
        novedadesData.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.fecha}</td>
                <td class="font-extrabold">${item.ruta}</td>
                <td>${item.cgm}</td>
                <td class="critical-text">${item.estado}</td>
                <td class="text-[11px] italic opacity-80">${item.detalle}</td>
            `;
            tbody.appendChild(tr);
        });

        // 2. Gráfico de Evolución
        new Chart(document.getElementById('chartEvolucion'), {
            type: 'bar',
            data: {
                labels: ["12/01", "13/01", "14/01", "15/01", "16/01", "19/01", "20/01", "21/01", "22/01"],
                datasets: [
                    { label: 'CUMPLIMENTADO', data: [76, 69, 76, 77, 77, 77, 77, 78, 78], backgroundColor: '#4AB5E0', borderRadius: 5 },
                    { label: 'CHECK RECORRIDO', data: [5, 12, 5, 4, 4, 4, 4, 3, 3], backgroundColor: '#19567C', borderRadius: 5 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { font: { family: 'Montserrat', weight: 'bold' }, color: '#19567C' } } }
            }
        });

        // 3. Lógica del Mapa (Leaflet)
        let mapInstance;
        function openMap() {
            document.getElementById('map-modal').style.display = 'flex';
            if (!mapInstance) {
                mapInstance = L.map('map').setView([-34.706, -58.391], 12);
                
                // Fondo en escala de grises (Tiles claros)
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; CartoDB'
                }).addTo(mapInstance);

                // Estilo Dinámico de Rutas
                // Nota: Aquí se inyectaría el contenido de RutasCovelia.geojson en la variable geoJSONData
                L.geoJSON(geoJSONData, { 
                    style: function(f) {
                        const status = statusMap[f.properties.RUTA] || 'CUMPLIMENTADO';
                        const esCheck = status === 'CHECK RECORRIDO';
                        return { 
                            color: esCheck ? '#D34872' : '#4AB5E0', 
                            weight: esCheck ? 5 : 2, 
                            opacity: 0.9, 
                            fillOpacity: esCheck ? 0.6 : 0.2 
                        };
                    },
                    onEachFeature: (f, l) => {
                        l.bindPopup(`<b>Ruta: ${f.properties.RUTA}</b><br>Estado: ${statusMap[f.properties.RUTA] || 'CUMPLIMENTADO'}`);
                    }
                }).addTo(mapInstance);
            } else {
                mapInstance.invalidateSize();
            }
        }

        function closeMap() { document.getElementById('map-modal').style.display = 'none'; }
    </script>
</body>
</html>
