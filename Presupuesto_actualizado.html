    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER */
        .solid-header {
             background-color: var(--bg-main);
             border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* TIPOGRAFÍA */
        h1 { font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        h2 { font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--azul-inst); }
        .text-desc { font-weight: 400; font-size: 0.875rem; }
        .text-num { font-weight: 700; }
        .tracking-widest { letter-spacing: 0.1em; }

        /* COMPONENTES BASE (CARDS FLAT) */
        .card-informativa {
            background-color: var(--blanco);
            color: var(--azul-inst);
            border-radius: var(--radius-sys);
            padding: 1.5rem;
            position: relative;
            border-left: 8px solid var(--acento);
        }

        .card-grafica {
            background-color: var(--glass-claro);
            color: var(--azul-inst);
            border-radius: var(--radius-sys);
            padding: 1.5rem;
        }

        .kpi-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            opacity: 0.05;
            color: var(--azul-inst);
        }

        /* TABLAS */
        .table-container {
            width: 100%;
            max-height: 800px;
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--azul-inst);
            padding: 1rem;
            text-align: left;
            border-bottom: 2px solid rgba(25, 86, 124, 0.2);
            position: sticky;
            top: 0;
            background: var(--blanco);
            z-index: 10;
        }
        td {
            padding: 1rem;
            font-size: 0.875rem;
            color: var(--azul-inst);
            border-bottom: 1px solid rgba(25, 86, 124, 0.1);
        }
        tbody tr:hover { background-color: rgba(25, 86, 124, 0.03); }
        
        .font-mono-nums { font-variant-numeric: tabular-nums; }
    </style>
</head>

        </section>

            <div class="flex justify-between items-center mb-6">

                <span class="text-xs font-bold uppercase tracking-widest opacity-60">Total Áreas: 18</span>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>

                            <th class="w-1/3">Descripción / Área</th>
                            <th class="text-right">Presupuestado</th>
                            <th class="text-right">Gastado</th> 
                            <th class="text-right">Saldo</th>
                            <th class="text-center">% Ejec.</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-presupuesto-body">

                </table>
            </div>
        </section>

    <script>
        const formatCurrency = (amount) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(amount);
        const formatLarge = (amount) => `$ ${new Intl.NumberFormat('es-AR', { maximumFractionDigits: 0 }).format(amount / 1000000)} M`;

        document.addEventListener('DOMContentLoaded', () => {
            const rawData = JSON.parse(document.getElementById('dashboard-data').textContent);
            document.getElementById('fecha-actual').textContent = new Date().toLocaleDateString('es-AR');

            // Renderizar KPIs
            const kpiContainer = document.getElementById('kpi-container');
            const kpis = [
                { title: "Total Presupuestado", value: formatLarge(rawData.totales.presupuestado), icon: "M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2" },
                { title: "Total Gastado", value: formatLarge(rawData.totales.gastado), icon: "M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" },
                { title: "Total Saldo", value: formatLarge(rawData.totales.saldo), icon: "M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0" }
            ];

            kpis.forEach(item => {
                const card = document.createElement('div');
                card.className = "card-informativa";
                card.innerHTML = `
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">${item.title}</p>
                    <h3 class="text-3xl font-extrabold font-mono-nums">${item.value}</h3>
                    <div class="kpi-icon"><svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="${item.icon}" /></svg></div>
                `;
                kpiContainer.appendChild(card);
            });

            // Renderizar Tabla
            const tablaBody = document.getElementById('tabla-presupuesto-body');
            rawData.detalle.forEach(row => {
                const tr = document.createElement('tr');
                const percent = ((row.Gastado / row.Presupuestado) * 100).toFixed(2);
                tr.innerHTML = `
                    <td class="text-num uppercase" style="font-size: 0.7rem;">${row.Descripcion}</td>
                    <td class="text-right font-mono-nums">${formatCurrency(row.Presupuestado)}</td>
                    <td class="text-right font-mono-nums" style="color: var(--magenta)">${formatCurrency(row.Gastado)}</td>
                    <td class="text-right font-mono-nums">${formatCurrency(row.Saldo)}</td>
                    <td class="text-center font-bold">${percent}%</td>
                `;
                tablaBody.appendChild(tr);
            });

            // Renderizar Gráfico
            Chart.defaults.color = '#19567C';
            Chart.defaults.font.family = "'Montserrat', sans-serif";
            const ctx = document.getElementById('presupuestoChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: rawData.detalle.map(d => d.Descripcion.replace('SECRETARIA DE ', '').substring(0, 15)),
                    datasets: [
                        { label: 'Presupuestado', data: rawData.detalle.map(d => d.Presupuestado), backgroundColor: '#19567C', borderRadius: 4 },
                        { label: 'Gastado', data: rawData.detalle.map(d => d.Gastado), backgroundColor: '#4AB5E0', borderRadius: 4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            grid: { color: 'rgba(25, 86, 124, 0.1)' },
                            ticks: { callback: (v) => '$' + (v / 1000000000).toFixed(0) + 'B' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
