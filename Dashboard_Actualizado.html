<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen del Dia - Jefatura de Gabinete</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Font: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* PALETA OBLIGATORIA SISTEMA FONDO OSCURO SGR */
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            font-weight: 400;
        }

        /* SISTEMA DE COMPONENTES */
        .radius-sys {
            border-radius: 12px !important;
        }

        /* TIPOGRAFÍA */
        h1 { font-weight: 800; text-transform: uppercase; }
        h2 { font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .text-desc { font-weight: 400; }
        .text-num { font-weight: 700; }

        /* CARDS */
        .card-informativa {
            background-color: var(--blanco);
            color: var(--azul-inst);
            box-shadow: none;
            border: none;
            border-left: 8px solid var(--acento);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card-informativa:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Ícono monocromático en transparencia (dentro de card informativa) */
        .card-icon {
            position: absolute;
            right: -10%;
            bottom: -20%;
            height: 140%;
            width: auto;
            color: var(--azul-inst);
            opacity: 0.05;
            z-index: 0;
            pointer-events: none;
        }

        /* HEADER */
        .solid-header {
             background-color: var(--bg-main);
             border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        /* BLOQUES SEPARADORES */
        .block-title {
            color: var(--blanco);
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .block-divider {
            flex-grow: 1;
            height: 1px;
            background-color: var(--blanco);
            opacity: 0.2;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--acento); border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-8">

    <!-- Encabezado SÓLIDO -->
    <header class="solid-header fixed top-0 left-0 w-full z-50">
        <div class="container mx-auto px-4 py-3">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-6 w-full sm:w-auto justify-center sm:justify-start">
                    <div>
                        <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-[var(--blanco)]">
                            Resumen del Día
                        </h1>
                        <p class="text-xs sm:text-sm font-bold tracking-widest uppercase mt-1 text-[var(--acento)]">
                            Bienvenido Intendente Federico Otermin
                        </p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 w-full sm:w-auto justify-center sm:justify-end">
                    <div class="hidden md:block text-right">
                        <p class="text-[var(--blanco)] opacity-70 text-[10px] font-bold uppercase tracking-widest">Última Actualización</p>
                        <p class="text-[var(--blanco)] text-sm font-bold" id="kpi-fecha">--/--/----</p>
                    </div>
                    <div class="h-10 w-px bg-[var(--blanco)] opacity-30 hidden sm:block"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="h-32 sm:h-24"></div>

    <!-- Contenedor principal estructurado por Bloques -->
    <div class="max-w-[1600px] mx-auto pb-12">
        
        <!-- BLOQUE 1: ATENCIÓN CIUDADANA (SGR) -->
        <section class="mb-14">
            <div class="block-title">
                <span>Atención a la Comunidad (SGR)</span>
                <div class="block-divider"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="bloque-sgr-container">
                <!-- Se llenará con JS -->
            </div>
        </section>

        <!-- BLOQUE 2: SEGURIDAD Y JUSTICIA -->
        <section class="mb-14">
            <div class="block-title">
                <span>Seguridad y Justicia</span>
                <div class="block-divider"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="bloque-seguridad-container">
                <!-- Se llenará con JS -->
            </div>
        </section>

        <!-- BLOQUE 3: OPERACIONES URBANAS -->
        <section class="mb-14">
            <div class="block-title">
                <span>Operaciones Urbanas</span>
                <div class="block-divider"></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="bloque-operaciones-container">
                <!-- Se llenará con JS -->
            </div>
        </section>

        <!-- Footer -->
        <footer class="mt-16 text-center text-[var(--blanco)] text-desc text-xs opacity-60">
             <div class="flex justify-center items-center gap-4 mb-2">
                <span class="h-px w-8 bg-[var(--blanco)] opacity-30"></span>
                <p class="uppercase tracking-widest font-normal">Municipio de Lomas de Zamora</p>
                <span class="h-px w-8 bg-[var(--blanco)] opacity-30"></span>
            </div>
            <p>© 2026 · Unidad de Datos e Infraestructura</p>
        </footer>

    </div>

    <!-- SCRIPT DE DATOS Y RENDERIZADO -->
    <script>
        // Establecer fecha actual
        const hoy = new Date();
        const fechaFormateada = hoy.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        document.getElementById('kpi-fecha').textContent = fechaFormateada;

        // ============================================================================
        // DATOS PARA ACTUALIZACIÓN POR PYTHON
        // ============================================================================
        
        // 1. Datos Resumen Diario (SGR)
        const resumenDiarioData = {
            "total_registros": 1890,
            "top_tipo": "Servicios Públicos",
            "top_sub_tipo": "Retiro de ramas y troncos de poda domiciliaria",
            "top_zonificacion_cav": "LOMAS"
};

        // 2. Datos Seguridad y Justicia
        const rawSeguridad911 = {
            "('ALARMAS (SPB Tobilleras)', datetime.date(2026, 4, 20))": 12,
            "('ALARMAS (SV-SENSOR VERIFICADO)', datetime.date(2026, 4, 20))": 1,
            "('Alarma', datetime.date(2026, 4, 20))": 9,
            "('Auxilio general', datetime.date(2026, 4, 20))": 13,
            "('BOTON PANICO (COLECTIVO)', datetime.date(2026, 4, 20))": 1,
            "('Disparo de arma de fuego', datetime.date(2026, 4, 20))": 1,
            "('EMERGENCIA DE SALUD (PRESUNCIÓN DE FALLECIMIENTO)', datetime.date(2026, 4, 20))": 2,
            "('Emergencia sanitaria', datetime.date(2026, 4, 20))": 3,
            "('Hallazgo vehicular', datetime.date(2026, 4, 20))": 2,
            "('Incendio', datetime.date(2026, 4, 20))": 3,
            "('Persona en actitud sospechosa', datetime.date(2026, 4, 20))": 3,
            "('Robo de autoparte', datetime.date(2026, 4, 20))": 2,
            "('Robo de motovehículo', datetime.date(2026, 4, 20))": 3,
            "('Robo de vehículo', datetime.date(2026, 4, 20))": 5,
            "('Robo en finca', datetime.date(2026, 4, 20))": 2,
            "('Robo en vía pública', datetime.date(2026, 4, 20))": 3,
            "('STARLIGHT (USO EXCLUSIVO CD) ((CD) ROBO (PROTECCIÓN LOCAL))', datetime.date(2026, 4, 20))": 1,
            "('Siniestro vial', datetime.date(2026, 4, 20))": 12,
            "('Violencia', datetime.date(2026, 4, 20))": 5,
            "('Violencia de género', datetime.date(2026, 4, 20))": 4,
            "('Violencia intrafamiliar', datetime.date(2026, 4, 20))": 3
};
        const rawEmergencias107 = {
            "('Domicilio Particular', '20/04/2026')": 18,
            "('Instituciones Educativas', '20/04/2026')": 10,
            "('Vía Pública', '20/04/2026')": 19,
            "('Área Pública', '20/04/2026')": 3
};

        const totalSeguridad911 = Object.values(rawSeguridad911).reduce((sum, val) => sum + val, 0);
        const totalEmergencias107 = Object.values(rawEmergencias107).reduce((sum, val) => sum + val, 0);

        const top3Seguridad911 = {
            "Robo en vía pública": 98,
            "Robo de vehículo": 77,
            "Robo en finca": 57
};

        const top3Emergencias107 = {
            "Domicilio Particular": 345,
            "Vía Pública": 318,
            "Instituciones Educativas": 99
};

        // 3. Datos Operaciones (Ceamse / Flota)
        const rawKpiData = {
            "total_descargas_ceamse": 2257,
            "total_tn_neta_ceamse": 16657.48,
            "proyeccion_tn_neta_ceamse": 24986.22,
            "camiones_trabajando_su": 73,
            "camiones_op_trabajando": 11,
            "porcentaje_cumplidas_covelia": 94.04761904761905
};
        // ============================================================================

        // --- Funciones de Formateo ---
        const formatNumber = (num, decimals = 0) => {
            return num.toLocaleString('es-AR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        };
        const formatCurrency = (num) => {
            return num.toLocaleString('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 2 });
        };

        // --- Lógica de Renderizado SGR UI ---
        function renderKpiCard(containerId, config) {
            const container = document.getElementById(containerId);
            const card = document.createElement('div');
            
            // Si hay un color específico para el borde (ej. alertas), lo aplicamos. Si no, usa el Acento.
            let borderStyle = config.borderColor ? `border-left-color: ${config.borderColor};` : '';
            
            card.className = `card-informativa radius-sys p-6 flex flex-col justify-between h-full`;
            card.style = borderStyle;

            // Ajuste dinámico de tamaño de fuente para textos largos vs números
            let valClass = "text-4xl";
            if (config.htmlValue) {
                valClass = "text-sm font-bold mt-3 w-full"; // Estilo para listas/html
            } else {
                const valStr = String(config.value);
                if (valStr.length > 20) {
                    valClass = "text-xl";
                } else if (valStr.length > 12 || isNaN(valStr.replace(/[$.,\s%]/g, ''))) {
                    valClass = "text-2xl leading-tight";
                }
            }

            // Footer opcional
            const footerHtml = config.footer 
                ? `<div class="mt-4 pt-3 border-t border-[var(--azul-inst)] border-opacity-10 text-[10px] text-[var(--azul-inst)] font-bold tracking-widest uppercase">${config.footer}</div>` 
                : '';

            card.innerHTML = `
                <svg class="card-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="${config.icon}"></path></svg>
                <div class="relative z-10 flex flex-col h-full justify-between">
                    <div>
                        <p class="font-bold text-xs uppercase tracking-widest mb-1 opacity-70">${config.title}</p>
                        <div class="text-num mt-2 ${valClass}" style="color: var(--azul-inst);">${config.htmlValue || config.value}</div>
                        ${config.unit ? `<p class="text-[10px] uppercase mt-2 opacity-60 font-bold tracking-widest">${config.unit}</p>` : ''}
                    </div>
                    ${footerHtml}
                </div>
            `;
            container.appendChild(card);
        }

        // --- 1. CARGAR BLOQUE SGR ---
        const sgrConfig = [
            {
                title: "Gestiones Ingresadas",
                value: formatNumber(resumenDiarioData.total_registros),
                unit: "Total Registros",
                icon: "M9 2a1 1 0 000 2h2a1 1 0 100-2H9z M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5z"
            },
            {
                title: "Área con Mayor Demanda",
                value: resumenDiarioData.top_tipo,
                unit: "Top Tipo",
                icon: "M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"
            },
            {
                title: "Principal Reclamo",
                value: resumenDiarioData.top_sub_tipo,
                unit: "Top Subtipo",
                icon: "M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"
            },
            {
                title: "CGM con MAYOR DEMANDA",
                value: resumenDiarioData.top_zonificacion_cav,
                unit: "CGM / Delegación",
                icon: "M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z M15 11a3 3 0 11-6 0 3 3 0 016 0z"
            }
        ];
        sgrConfig.forEach(cfg => renderKpiCard('bloque-sgr-container', cfg));

        // --- 2. CARGAR BLOQUE SEGURIDAD Y JUSTICIA ---
        const formatTop3Html = (dataObj) => {
            return Object.entries(dataObj)
                .map(([k, v], i) => `<div class="flex justify-between items-center py-1.5 border-b border-[var(--azul-inst)] border-opacity-10 last:border-0"><span class="truncate pr-2">${i+1}. ${k}</span><span class="font-extrabold text-[var(--azul-inst)] opacity-80">${v}</span></div>`)
                .join('');
        };

        const seguridadConfig = [
            {
                title: "Seguridad 911",
                value: formatNumber(totalSeguridad911),
                unit: "Sucesos Registrados (Día)",
                icon: "M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" // Icono de escudo
            },
            {
                title: "Emergencias 107",
                value: formatNumber(totalEmergencias107),
                unit: "Asistencias Médicas (Día)",
                icon: "M9 12h6m-3-3v6m-9-3a9 9 0 1118 0 9 9 0 01-18 0z" // Icono médico (círculo con cruz)
            },
            {
                title: "Top 3 - 911 (Mes)",
                htmlValue: formatTop3Html(top3Seguridad911),
                unit: "Tipos de Sucesos",
                icon: "M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
            },
            {
                title: "Top 3 - 107 (Mes)",
                htmlValue: formatTop3Html(top3Emergencias107),
                unit: "Lugares de Asistencia",
                icon: "M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
            }
        ];
        seguridadConfig.forEach(cfg => renderKpiCard('bloque-seguridad-container', cfg));

        // --- 3. CARGAR BLOQUE OPERACIONES ---
        const VALOR_TN = 40487.91;
        const gastoEstimado = rawKpiData.proyeccion_tn_neta_ceamse * VALOR_TN;

        const opsConfig = [
            {
                title: "Descargas CEAMSE",
                value: formatNumber(rawKpiData.total_descargas_ceamse),
                unit: "Unidades",
                icon: "M19 14l-7 7m0 0l-7-7m7 7V3"
            },
            {
                title: "Total Descargado (CEAMSE)",
                value: formatNumber(rawKpiData.total_tn_neta_ceamse, 2),
                unit: "Toneladas",
                icon: "M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"
            },
            {
                title: "Proyección Mensual (CEAMSE)",
                value: formatNumber(rawKpiData.proyeccion_tn_neta_ceamse, 2),
                unit: "Toneladas Est.",
                icon: "M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z",
                footer: `Valor Tn: $40.487,91 | Est: ${formatCurrency(gastoEstimado)}`
            },
            {
                title: "Flota Lomas Limpia",
                value: rawKpiData.camiones_trabajando_su,
                unit: "Camiones Operativos",
                icon: "M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0zM13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"
            },
            {
                title: "Flota Obras Públicas",
                value: rawKpiData.camiones_op_trabajando,
                unit: "Camiones Operativos",
                icon: "M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"
            },
            {
                title: "Cumplimiento Recorrido Covelia",
                value: formatNumber(rawKpiData.porcentaje_cumplidas_covelia, 2) + "%",
                unit: "Efectividad",
                icon: "M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z",
                borderColor: rawKpiData.porcentaje_cumplidas_covelia < 80 ? "var(--magenta)" : ""
            }
        ];
        opsConfig.forEach(cfg => renderKpiCard('bloque-operaciones-container', cfg));

    </script>
</body>
</html>
